<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聪明果园</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
    <div class="overlay">
        <h1>聪明果园</h1>

        <p class="subtitle">
            果园现摘 · 新鲜直发
        </p>

        <a href="#products" class="btn">
            立即选购
        </a>
    </div>
</section>

<section class="intro">

    <h2>来自果园的新鲜桃子</h2>

    <p>
        每一颗桃子均为现摘现发，
        不囤货、不催熟，
        最大程度保留桃子的鲜甜口感。
    </p>

    <div class="notice">

        <div class="card">
            🍑 现摘现发
        </div>

        <div class="card">
            📦 坏果包赔
        </div>

        <div class="card">
            🚚 全国发货
        </div>

    </div>

</section>

<section id="products" class="products">
  <h2>选择桃子</h2>

  <div class="order-box">
    <label>选择品种</label>
    <select id="product">
      <option value="脆红桃">脆红桃</option>
      <option value="小白凤">小白凤</option>
    </select>

    <label>选择规格</label>
    <select id="spec">
      <option value="12个装">12个装</option>
      <option value="18个装">18个装</option>
      <option value="24个装">24个装</option>
    </select>

    <label>购买数量</label>
    <input id="quantity" type="number" min="1" value="1">

    <div class="price-box">
      应付金额：<span id="totalPrice">69</span> 元
    </div>
<div class="customer-form">
  <label>收货人</label>
  <input id="customerName" type="text" placeholder="请输入收货人姓名">

  <label>手机号</label>
  <input id="phone" type="tel" placeholder="请输入手机号">

  <label>收货地址</label>
  <textarea id="address" placeholder="请填写详细收货地址"></textarea>

  <label>备注</label>
  <textarea id="remark" placeholder="如有特殊要求，请留言"></textarea>

  <button id="submitOrder" class="submit-btn">立即下单</button>
</div>
  </div>
</section>

<section class="promise">

    <h2>售后承诺</h2>

    <p>
        桃子属于生鲜水果，
        我们会认真包装后发货。

        若运输过程中出现破损、
        坏果等情况，

        请及时联系，

        我们将第一时间补发或赔付。

    </p>

    <p>
        您的信任，
        是我们最大的支持。
    </p>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
